server {
  listen 3400 default_server;
  listen [::]:3400 default_server;

  server_name _;
  root /var/www/atc-notify-web;
  index index.html;

  # Angular SPA routing
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static files that Angular hashes by filename
  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|otf)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    access_log off;
    try_files $uri =404;
  }
}
